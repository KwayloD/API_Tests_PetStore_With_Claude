[pytest]
# Корневая директория для импортов (позволяет писать: from api.pet_api import PetAPI)
pythonpath = .

# Директория с тестами
testpaths = tests

# Флаги запуска по умолчанию:
#   -v  — подробный вывод
#   --tb=short — краткий traceback при ошибках
addopts = -v --tb=short

# Логирование в консоль во время выполнения тестов
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
